spring.datasource.url=jdbc:postgresql://localhost:5432/skedify
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Clerk dev JWKS URI (extracted from pk_test_ publishable key)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://assured-seahorse-83.clerk.accounts.dev/.well-known/jwks.json

# Stripe (test keys from dashboard.stripe.com → test mode)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price-id=${STRIPE_PRICE_ID:}

# Resend (optional locally — can be left empty, emails will not be sent)
resend.api-key=${RESEND_API_KEY:}
resend.from-email=noreply@skedify.io

app.frontend-url=http://localhost:3000
