spring.application.name=skedify-backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
server.port=${PORT:8080}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI:}

# Resend (email)
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price-id=${STRIPE_PRICE_ID:}

# App
app.frontend-url=${APP_FRONTEND_URL:https://skedify-io.vercel.app}
app.base-url=${APP_FRONTEND_URL:https://skedify-io.vercel.app}
