services:
  postgres:
    image: postgres:17-alpine
    container_name: skedify-db
    environment:
      POSTGRES_DB: skedify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - skedify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  skedify_pgdata:
